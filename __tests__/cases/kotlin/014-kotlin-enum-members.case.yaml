input/enum-members.kt: |
  package com.example

  enum class Color(val rgb: Int) {
      RED(0xFF0000) {
          override fun isPrimary(): Boolean = true
          override fun getHex(): String = "#FF0000"
      },
      GREEN(0x00FF00) {
          override fun isPrimary(): Boolean = true
          override fun getHex(): String = "#00FF00"
      },
      BLUE(0x0000FF) {
          override fun isPrimary(): Boolean = true
          override fun getHex(): String = "#0000FF"
      },
      YELLOW(0xFFFF00) {
          override fun isPrimary(): Boolean = false
          override fun getHex(): String = "#FFFF00"
      };

      abstract fun isPrimary(): Boolean
      abstract fun getHex(): String
  }

  enum class State {
      IDLE {
          fun start(): Processing = Processing
      },
      PROCESSING {
          fun complete(): Success = Success
          fun fail(): Error = Error
      },
      SUCCESS {
          fun reset(): Idle = Idle
      },
      ERROR {
          fun retry(): Processing = Processing
      }
  }

  enum class Priority(val value: Int) {
      LOW(1),
      MEDIUM(5),
      HIGH(10) {
          fun isUrgent(): Boolean = true
      },
      CRITICAL(20) {
          fun isUrgent(): Boolean = true
          fun canInterrupt(): Boolean = true
      };

      fun getLevel(): String = name.lowercase()
  }
